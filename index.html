<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle of Willis — 3D Anatomy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e8e8f0;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}

#scene-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

#label-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}

#tooltip {
  position: fixed;
  background: rgba(10, 10, 20, 0.93);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 12px;
  color: #e8e8f0;
  pointer-events: none;
  display: none;
  z-index: 10;
  white-space: nowrap;
  max-width: 320px;
}

#control-panel {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 156px;
}

.ctrl-section-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: rgba(255,255,255,0.38);
  padding: 5px 2px 2px;
}

.ctrl-btn {
  background: rgba(18, 18, 32, 0.88);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 5px;
  color: #d8d8e8;
  padding: 7px 11px;
  font-size: 11.5px;
  cursor: pointer;
  text-align: left;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  font-family: 'Segoe UI', Arial, sans-serif;
}
.ctrl-btn:hover {
  background: rgba(35, 35, 55, 0.96);
  border-color: rgba(255,255,255,0.38);
  color: #fff;
}
.ctrl-btn.active {
  background: rgba(22, 52, 90, 0.92);
  border-color: #3a82d0;
  color: #7ec8ff;
}

#legend {
  position: fixed;
  bottom: 20px; left: 16px;
  z-index: 5;
  background: rgba(10, 10, 20, 0.86);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 7px;
  padding: 10px 14px;
  font-size: 12px;
}

.legend-title {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: rgba(255,255,255,0.42);
  margin-bottom: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 5px 0;
  color: rgba(255,255,255,0.82);
  font-size: 11.5px;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

#info-panel {
  position: fixed;
  bottom: 20px; right: 16px;
  z-index: 5;
  background: rgba(10, 10, 20, 0.93);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  padding: 14px 16px 14px;
  width: 290px;
  display: none;
}

.info-header {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 7px;
  padding-right: 20px;
}

.info-color-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 3px;
}

.info-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  line-height: 1.35;
}

.info-territory {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 9px;
  padding-bottom: 9px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  line-height: 1.4;
}

.info-notes {
  font-size: 11.5px;
  color: rgba(255,255,255,0.78);
  line-height: 1.55;
}

#close-info {
  position: absolute;
  top: 10px; right: 11px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.38);
  font-size: 13px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 3px;
  line-height: 1;
  font-family: 'Segoe UI', Arial, sans-serif;
}
#close-info:hover { color: #fff; background: rgba(255,255,255,0.1); }

.vessel-label {
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  color: #ffffff;
  background: rgba(8, 8, 18, 0.80);
  border: 1px solid rgba(255,255,255,0.26);
  border-radius: 3px;
  padding: 1px 5px;
  white-space: nowrap;
  pointer-events: none;
  user-select: none;
  letter-spacing: 0.02em;
}

#nav-hint {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  font-size: 10.5px;
  color: rgba(255,255,255,0.28);
  pointer-events: none;
  white-space: nowrap;
}

#title-bar {
  position: fixed;
  top: 16px; left: 16px;
  z-index: 5;
  pointer-events: none;
}

#title-bar h1 {
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}

#title-bar p {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div id="scene-container"></div>
<div id="label-container"></div>
<div id="tooltip"></div>

<div id="title-bar">
  <h1>Circle of Willis</h1>
  <p>CEREBROVASCULAR ANATOMY — 3D INTERACTIVE</p>
</div>

<div id="control-panel">
  <div class="ctrl-section-label">Labels</div>
  <button class="ctrl-btn active" id="btn-labels">Labels: ON</button>

  <div class="ctrl-section-label">Camera View</div>
  <button class="ctrl-btn" id="btn-view-default">CoW Ring</button>
  <button class="ctrl-btn" id="btn-view-inferior">Inferior (Basal)</button>
  <button class="ctrl-btn" id="btn-view-lateral">Lateral</button>
  <button class="ctrl-btn" id="btn-view-anterior">Anterior</button>
  <button class="ctrl-btn" id="btn-view-full">Full Anatomy</button>
  <button class="ctrl-btn" id="btn-view-reset">Reset Camera</button>
</div>

<div id="legend">
  <div class="legend-title">Vessel Territory</div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#C62828"></span>
    Anterior / Carotid
  </div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#1565C0"></span>
    Posterior / Vertebrobasilar
  </div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#2E7D32"></span>
    Communicating Arteries
  </div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#5D4037"></span>
    Arch / Systemic Origin
  </div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#B71C1C"></span>
    External Carotid (face)
  </div>
</div>

<div id="info-panel">
  <button id="close-info">✕</button>
  <div class="info-header">
    <span class="info-color-dot" id="ip-dot"></span>
    <span class="info-title" id="ip-title"></span>
  </div>
  <div class="info-territory" id="ip-territory"></div>
  <div class="info-notes" id="ip-notes"></div>
</div>

<div id="nav-hint">Left-drag: rotate &nbsp;·&nbsp; Scroll: zoom &nbsp;·&nbsp; Mid/Right-drag: pan &nbsp;·&nbsp; Click vessel: details</div>

<script src="three.min.js"></script>
<script src="OrbitControls.js"></script>
<script src="CSS2DRenderer.js"></script>

<script>
// Visible error trap — surfaces JS errors on-screen so they're never invisible
window.onerror = function(msg, src, line) {
  var el = document.getElementById('scene-container');
  if (el) el.innerHTML = '<div style="color:#ff6b6b;font-family:monospace;padding:40px;font-size:13px;white-space:pre-wrap;">JS ERROR (line ' + line + '):\n' + msg + '\n\nSource: ' + src + '</div>';
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const V = (x, y, z) => new THREE.Vector3(x, y, z);

const ANT  = '#C62828';   // Anterior circulation
const POST = '#1565C0';   // Posterior circulation
const COMM = '#2E7D32';   // Communicating arteries
const SYST = '#5D4037';   // Systemic arch vessels (aorta, brachiocephalic, subclavian)
const EXT  = '#B71C1C';   // External carotid (face/scalp, not brain)

// ─── VESSEL DATA ─────────────────────────────────────────────────────────────
// Coordinate system: +X = patient right, +Y = superior, +Z = anterior
// Scale: 1 unit ≈ 1 cm. CoW ring sits at Y ≈ 2.5, Z from -2.0 to +0.7

const VESSEL_DATA = [

  // ════════════════════════════════════════════════════════════════════════════
  //  POSTERIOR CIRCULATION
  // ════════════════════════════════════════════════════════════════════════════

  {
    id: 'BA',
    name: 'Basilar Artery',
    abbreviation: 'BA',
    territory: 'Posterior — pons, midbrain, posterior thalamus, cerebellum',
    color: POST,
    radius: 0.20,
    points: [
      V(0, -2.0, -3.0),   // pontomedullary junction (VA convergence)
      V(0, -0.5, -2.8),   // lower basilar
      V(0,  1.0, -2.5),   // mid basilar
      V(0,  2.2, -2.2),   // upper basilar
      V(0,  2.5, -2.0),   // basilar tip / bifurcation
    ],
    labelOffset: V(0.48, 0, 0),
    notes: 'Formed by convergence of both vertebral arteries at the pontomedullary junction. Runs superiorly in the prepontine cistern. Bifurcates at the pontomesencephalic junction into both PCAs. Basilar occlusion → "locked-in syndrome" (basilar artery thrombosis). Basilar tip aneurysms carry high surgical risk. Pontine perforators (paramedian branches) are critical and non-collateralized.'
  },

  {
    id: 'VA_L',
    name: 'Vertebral Artery (Left) — V4',
    abbreviation: 'VA (L)',
    territory: 'Posterior — lateral medulla, posterior fossa (via PICA)',
    color: POST,
    radius: 0.15,
    points: [
      V(-2.0, -4.0, -4.0),  // enters foramen magnum inferolaterally
      V(-1.5, -3.2, -3.8),  // ascending along left side of medulla
      V(-0.8, -2.8, -3.5),  // curving medially (PICA origin nearby)
      V(-0.2, -2.2, -3.2),  // approaching midline
      V( 0.0, -2.0, -3.0),  // converges with right VA → basilar
    ],
    labelOffset: V(-0.58, 0, 0),
    notes: 'V4 (intracranial) segment shown. Pierces dura at foramen magnum. Dissection → Wallenberg syndrome (lateral medullary infarct: ipsilateral face, contralateral body pain/temperature loss, Horner syndrome, dysphagia, vertigo). The left VA is dominant in ~60% of people. Gives rise to PICA and anterior spinal artery.'
  },

  {
    id: 'VA_R',
    name: 'Vertebral Artery (Right) — V4',
    abbreviation: 'VA (R)',
    territory: 'Posterior — lateral medulla, posterior fossa (via PICA)',
    color: POST,
    radius: 0.15,
    points: [
      V( 2.0, -4.0, -4.0),
      V( 1.5, -3.2, -3.8),
      V( 0.8, -2.8, -3.5),
      V( 0.2, -2.2, -3.2),
      V( 0.0, -2.0, -3.0),
    ],
    labelOffset: V(0.58, 0, 0),
    notes: 'V4 (intracranial) segment. Often smaller than left VA (hypoplastic right VA in ~30%). Bilateral VA occlusion → basilar insufficiency. Atherosclerosis of V4 origin is a common cause of posterior circulation TIA. Right VA dissection is a recognized complication of cervical manipulation.'
  },

  {
    id: 'PICA_L',
    name: 'Posterior Inferior Cerebellar Artery (Left)',
    abbreviation: 'PICA (L)',
    territory: 'Posterior — inferior cerebellum, cerebellar tonsil, lateral medulla',
    color: POST,
    radius: 0.10,
    points: [
      V(-0.8, -2.8, -3.5),  // origin from left VA (V4 segment)
      V(-1.2, -3.2, -3.2),  // descending — the classic PICA loop
      V(-1.5, -3.5, -2.8),  // caudal loop apex near cerebellar tonsil
      V(-1.8, -3.0, -2.2),  // ascending limb, heading posterolateral
      V(-2.0, -2.5, -2.0),  // distributes over inferior cerebellar hemisphere
    ],
    labelOffset: V(-0.52, 0, 0.35),
    notes: 'Arises from V4. Most variable vessel in the CoW complex. The "PICA loop" dips to the level of the cerebellar tonsil — used surgically as a landmark for the tonsil. PICA infarct = Wallenberg syndrome: ipsilateral face, contralateral body pain/temperature loss, Horner syndrome, nystagmus, dysphagia, hiccup. May be absent (~5%) with AICA compensating.'
  },

  {
    id: 'PICA_R',
    name: 'Posterior Inferior Cerebellar Artery (Right)',
    abbreviation: 'PICA (R)',
    territory: 'Posterior — inferior cerebellum, cerebellar tonsil, lateral medulla',
    color: POST,
    radius: 0.10,
    points: [
      V( 0.8, -2.8, -3.5),
      V( 1.2, -3.2, -3.2),
      V( 1.5, -3.5, -2.8),
      V( 1.8, -3.0, -2.2),
      V( 2.0, -2.5, -2.0),
    ],
    labelOffset: V(0.52, 0, 0.35),
    notes: 'Arises from right V4. Supplies posterior inferior cerebellar hemisphere, inferior vermis, and cerebellar tonsil. Occlusion causes lateral medullary infarct (Wallenberg). Tonsillar herniation from mass lesions compresses the PICA loop, making it a radiological marker for herniation severity on MRA.'
  },

  {
    id: 'AICA_L',
    name: 'Anterior Inferior Cerebellar Artery (Left)',
    abbreviation: 'AICA (L)',
    territory: 'Posterior — anterior inferior cerebellum, CN VII/VIII, lateral pons',
    color: POST,
    radius: 0.08,
    points: [
      V( 0.0, -1.5, -2.8),  // origin from proximal basilar
      V(-0.8, -1.8, -2.5),  // coursing laterally, slightly inferior
      V(-1.6, -2.0, -2.2),  // approaching cerebellopontine angle
      V(-2.0, -2.2, -2.0),  // looping in CP angle (near CN VII/VIII)
      V(-2.2, -2.0, -1.8),  // distributes over anterior inferior cerebellum
    ],
    labelOffset: V(-0.42, 0.38, 0),
    notes: 'Arises from proximal basilar. Courses through the cerebellopontine angle alongside CN VII (facial) and CN VIII (vestibulocochlear). AICA loop enters and exits the internal auditory canal. AICA infarct → ipsilateral facial palsy + sensorineural hearing loss + vertigo + cerebellar ataxia + contralateral pain/temperature loss (lateral pontine syndrome).'
  },

  {
    id: 'AICA_R',
    name: 'Anterior Inferior Cerebellar Artery (Right)',
    abbreviation: 'AICA (R)',
    territory: 'Posterior — anterior inferior cerebellum, CN VII/VIII, lateral pons',
    color: POST,
    radius: 0.08,
    points: [
      V( 0.0, -1.5, -2.8),
      V( 0.8, -1.8, -2.5),
      V( 1.6, -2.0, -2.2),
      V( 2.0, -2.2, -2.0),
      V( 2.2, -2.0, -1.8),
    ],
    labelOffset: V(0.42, 0.38, 0),
    notes: 'AICA infarct produces a characteristic syndrome: the combination of ipsilateral facial palsy (CN VII), hearing loss (CN VIII), Horner syndrome, and cerebellar signs with contralateral hemibody pain/temperature loss localizes precisely to the lateral pons. The labyrinthine artery (internal auditory artery) typically arises from AICA.'
  },

  {
    id: 'SCA_L',
    name: 'Superior Cerebellar Artery (Left)',
    abbreviation: 'SCA (L)',
    territory: 'Posterior — superior cerebellum, dentate nucleus, superior cerebellar peduncle',
    color: POST,
    radius: 0.08,
    points: [
      V( 0.0,  2.0, -2.3),  // origin from distal basilar, just below bifurcation
      V(-0.8,  1.8, -2.2),  // coursing laterally under CN III
      V(-1.5,  1.6, -2.0),  // running beneath tentorium cerebelli
      V(-2.0,  1.5, -1.8),  // lateral, approaching superior cerebellar surface
      V(-2.5,  1.4, -1.5),  // distributes over superior cerebellar hemisphere
    ],
    labelOffset: V(-0.38, 0.42, 0),
    notes: 'Arises from distal basilar just below PCA bifurcation, running beneath the tentorium. Courses near CN III (oculomotor) — SCA aneurysms can cause CN III palsy. SCA infarct: contralateral limb/gait ataxia (dentate nucleus, superior cerebellar peduncle), often spares cerebellar tonsil. May cause ipsilateral Horner syndrome and contralateral pain/temperature loss.'
  },

  {
    id: 'SCA_R',
    name: 'Superior Cerebellar Artery (Right)',
    abbreviation: 'SCA (R)',
    territory: 'Posterior — superior cerebellum, dentate nucleus, superior cerebellar peduncle',
    color: POST,
    radius: 0.08,
    points: [
      V( 0.0,  2.0, -2.3),
      V( 0.8,  1.8, -2.2),
      V( 1.5,  1.6, -2.0),
      V( 2.0,  1.5, -1.8),
      V( 2.5,  1.4, -1.5),
    ],
    labelOffset: V(0.38, 0.42, 0),
    notes: 'Arises from distal basilar. SCA infarct produces contralateral limb and gait ataxia, often with ipsilateral Horner syndrome. Because SCA and PCA share an origin at the basilar tip, both may be affected in basilar tip pathology. SCA infarct mimics PICA clinically but has different territory — imaging distinguishes them.'
  },

  {
    id: 'PCA_L',
    name: 'Posterior Cerebral Artery (Left) — P1 + P2',
    abbreviation: 'PCA (L)',
    territory: 'Posterior — occipital lobe, thalamus, midbrain, medial temporal lobe',
    color: POST,
    radius: 0.15,
    points: [
      V( 0.0,  2.5, -2.0),  // P1 origin at basilar bifurcation
      V(-0.8,  2.5, -2.0),  // P1 — horizontal, coursing laterally
      V(-1.5,  2.3, -1.8),  // P1/P2 junction — PComm inserts here
      V(-2.2,  2.0, -1.5),  // P2 — beginning to curve posteriorly around midbrain
      V(-2.8,  1.8, -1.0),  // P2 — continuing posterior along tentorium
    ],
    labelOffset: V(-0.58, 0.38, 0),
    notes: 'P1 = precommunicating segment (basilar tip → PComm insertion). P2 = postcommunicating segment (curves around midbrain in the ambient cistern). PCA infarct → contralateral homonymous hemianopia (occipital cortex), with macular sparing if collaterals preserved. P1 occlusion affects thalamus (thalamic infarct → contralateral hemisensory loss, memory impairment). ~20% of PCAs have "fetal" origin from ICA (large PComm replaces P1).'
  },

  {
    id: 'PCA_R',
    name: 'Posterior Cerebral Artery (Right) — P1 + P2',
    abbreviation: 'PCA (R)',
    territory: 'Posterior — occipital lobe, thalamus, midbrain, medial temporal lobe',
    color: POST,
    radius: 0.15,
    points: [
      V( 0.0,  2.5, -2.0),
      V( 0.8,  2.5, -2.0),
      V( 1.5,  2.3, -1.8),
      V( 2.2,  2.0, -1.5),
      V( 2.8,  1.8, -1.0),
    ],
    labelOffset: V(0.58, 0.38, 0),
    notes: 'P1 (precommunicating) + P2 (postcommunicating). Right PCA infarct: left homonymous hemianopia. Dominant hemisphere (left) PCA infarct may cause alexia without agraphia (splenium of corpus callosum), transcortical sensory aphasia. Posterior choroidal arteries arise from P2. The hippocampus receives PCA supply — bilateral PCA infarct causes profound amnestic syndrome.'
  },

  // ════════════════════════════════════════════════════════════════════════════
  //  ANTERIOR CIRCULATION
  // ════════════════════════════════════════════════════════════════════════════

  {
    id: 'ICA_L',
    name: 'Internal Carotid Artery (Left) — C6/C7',
    abbreviation: 'ICA (L)',
    territory: 'Anterior — ipsilateral cerebral hemisphere, anterior choroidal territory',
    color: ANT,
    radius: 0.25,
    points: [
      V(-2.5, -3.0, -1.0),  // C6 cavernous segment entry (parasellar)
      V(-2.3, -1.5, -0.8),  // ascending through cavernous sinus
      V(-2.2,  0.0, -0.5),  // C6/C7 transition at anterior clinoid process
      V(-2.0,  1.5, -0.3),  // C7 supraclinoid, ascending toward skull base
      V(-2.0,  2.5,  0.0),  // ICA terminus — bifurcates into MCA + ACA
    ],
    labelOffset: V(-0.62, 0, 0.32),
    notes: 'C6 (cavernous) → C7 (supraclinoid) segments shown. The "carotid siphon" S-curve visible on angiography. Most common site of extracranial atherosclerosis is the carotid bifurcation (in neck, not shown). C7 gives rise to the anterior choroidal artery (supplies internal capsule, hippocampus, basal ganglia). ICA terminus bifurcates into MCA and ACA. Carotid siphon calcification visible on non-contrast CT.'
  },

  {
    id: 'ICA_R',
    name: 'Internal Carotid Artery (Right) — C6/C7',
    abbreviation: 'ICA (R)',
    territory: 'Anterior — ipsilateral cerebral hemisphere, anterior choroidal territory',
    color: ANT,
    radius: 0.25,
    points: [
      V( 2.5, -3.0, -1.0),
      V( 2.3, -1.5, -0.8),
      V( 2.2,  0.0, -0.5),
      V( 2.0,  1.5, -0.3),
      V( 2.0,  2.5,  0.0),
    ],
    labelOffset: V(0.62, 0, 0.32),
    notes: 'C6 (cavernous) → C7 (supraclinoid) segments. ICA dissection causes ipsilateral Horner syndrome (disrupts sympathetic chain within carotid wall) and can cause embolic stroke. C7 gives rise to anterior choroidal artery and ophthalmic artery (optic nerve supply). Historically, ICA ligation was used for giant cavernous sinus aneurysms when collateral via AComm was sufficient.'
  },

  {
    id: 'MCA_L',
    name: 'Middle Cerebral Artery (Left) — M1 Segment',
    abbreviation: 'MCA (L)',
    territory: 'Anterior — lateral hemisphere: motor/sensory cortex, Broca area, insular cortex',
    color: ANT,
    radius: 0.175,
    points: [
      V(-2.0,  2.5,  0.0),  // origin at ICA terminus
      V(-3.0,  2.5,  0.3),  // M1 — coursing laterally over insula, slight anterior drift
      V(-4.0,  2.5,  0.5),  // mid M1 (lenticulostriate arteries arise here)
      V(-4.8,  2.4,  0.8),  // approaching sylvian fissure
      V(-5.5,  2.3,  1.0),  // sylvian fissure entry (M1 terminus / M2 origin)
    ],
    labelOffset: V(0, 0.48, 0),
    notes: 'M1 (sphenoidal) segment, from ICA terminus to sylvian fissure entry. Largest branch of ICA and largest territory cerebral artery. Lenticulostriate arteries (small perforators) arise from M1 — supply internal capsule, putamen, caudate head. M1 occlusion = large MCA syndrome: contralateral dense hemiplegia (arm > leg), hemianopia, hemisensory loss, ipsilateral gaze preference. Dominant hemisphere → global aphasia. Primary mechanical thrombectomy target.'
  },

  {
    id: 'MCA_R',
    name: 'Middle Cerebral Artery (Right) — M1 Segment',
    abbreviation: 'MCA (R)',
    territory: 'Anterior — lateral hemisphere: motor/sensory cortex, visuospatial areas (non-dominant)',
    color: ANT,
    radius: 0.175,
    points: [

  document.getElementById('scene-container').appendChild(renderer.domElement);

  labelRenderer = new THREE.CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'fixed';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.getElementById('label-container').appendChild(labelRenderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.copy(CAMERA_PRESETS.default.target);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.screenSpacePanning = true;
  controls.mouseButtons = {
    LEFT:   THREE.MOUSE.ROTATE,
    MIDDLE: THREE.MOUSE.PAN,
    RIGHT:  THREE.MOUSE.PAN,
  };
  controls.minDistance = 3;
  controls.maxDistance = 150;
  controls.update();

  // Three-point lighting
  scene.add(new THREE.AmbientLight(0x404040, 0.8));
  const key = new THREE.DirectionalLight(0xfff5e0, 1.2);
  key.position.set(-5, 8, 5);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xe0eeff, 0.4);
  fill.position.set(8, 2, 3);
  scene.add(fill);
  const rim = new THREE.DirectionalLight(0xffffff, 0.3);
  rim.position.set(0, -3, -8);
  scene.add(rim);
}

// ─── BRAIN CONTEXT ───────────────────────────────────────────────────────────
function buildBrainContext() {
  // Brainstem ellipsoid — gives spatial grounding without distracting from vessels
  const bsGeom = new THREE.SphereGeometry(1, 32, 32);
  bsGeom.scale(2.0, 3.5, 1.8);
  const brainstem = new THREE.Mesh(bsGeom, new THREE.MeshPhongMaterial({
    color: 0x8B7355,
    transparent: true,
    opacity: 0.13,
    depthWrite: false,
    side: THREE.FrontSide,
  }));
  brainstem.position.set(0, -1.0, -2.8);
  brainstem.renderOrder = 1;
  scene.add(brainstem);

  // Sella turcica reference plane
  const sella = new THREE.Mesh(
    new THREE.CylinderGeometry(2.2, 2.2, 0.04, 48),
    new THREE.MeshPhongMaterial({
      color: 0x888899,
      transparent: true,
      opacity: 0.17,
      depthWrite: false,
    })
  );
  sella.position.set(0, 0, -0.5);
  sella.renderOrder = 1;
  scene.add(sella);

  // Sella label (context, not a vessel label)
  const sellaDiv = document.createElement('div');
  sellaDiv.style.cssText = 'font-size:9px;color:rgba(255,255,255,0.28);pointer-events:none;font-family:Arial,sans-serif;white-space:nowrap;';
  sellaDiv.textContent = 'sella turcica level';
  const sellaLabel = new THREE.CSS2DObject(sellaDiv);
  sellaLabel.position.set(2.5, 0.08, -0.5);
  sella.add(sellaLabel);
}

// ─── BUILD VESSELS ───────────────────────────────────────────────────────────
function buildVessels() {
  VESSEL_DATA.forEach(data => {
    const curve = new THREE.CatmullRomCurve3(data.points);

    // Visual tube
    const geo = new THREE.TubeGeometry(curve, 64, data.radius, 16, false);
    const colorHex = parseInt(data.color.slice(1), 16);
    const mat = new THREE.MeshPhongMaterial({
      color: colorHex,
      emissive: 0x000000,
      shininess: 85,
      specular: 0x3a3a3a,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = Object.assign({}, data, { originalColorHex: colorHex });

    // Invisible hit tube — 3× radius so it's clickable from any camera distance
    const hitGeo = new THREE.TubeGeometry(curve, 32, Math.max(data.radius * 3, 0.4), 6, false);
    const hitMat = new THREE.MeshBasicMaterial({ colorWrite: false, depthWrite: false });
    const hitMesh = new THREE.Mesh(hitGeo, hitMat);
    hitMesh.userData = Object.assign({}, data, { originalColorHex: colorHex, visualMesh: mesh });

    // Abbreviation label
    const div = document.createElement('div');
    div.className = 'vessel-label';
    div.textContent = data.abbreviation;
    const label = new THREE.CSS2DObject(div);
    label.position.copy(curve.getPoint(0.5)).add(data.labelOffset);
    label.visible = labelsVisible;
    mesh.add(label);

    scene.add(mesh);
    scene.add(hitMesh);
    interactableMeshes.push(hitMesh);  // raycast against hit tube, not visual
  });
}

// ─── BUILD JUNCTION SPHERES ──────────────────────────────────────────────────
function buildJunctions() {
  JUNCTION_DATA.forEach(jd => {
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(jd.radius, 16, 16),
      new THREE.MeshPhongMaterial({
        color: parseInt(jd.color.slice(1), 16),
        shininess: 85,
        specular: 0x3a3a3a,
      })
    );
    mesh.position.copy(jd.position);
    scene.add(mesh);
    // deliberately NOT added to interactableMeshes
  });
}

// ─── CAMERA TWEEN ────────────────────────────────────────────────────────────
function tweenCamera(preset, durationMs) {
  durationMs = durationMs || 800;
  const startPos    = camera.position.clone();
  const startTarget = controls.target.clone();
  const endPos      = preset.pos.clone();
  const endTarget   = preset.target.clone();
  const t0          = performance.now();

  if (cameraTweenId) cancelAnimationFrame(cameraTweenId);

  (function step() {
    const t = Math.min((performance.now() - t0) / durationMs, 1);
    const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; // ease-in-out quad
    camera.position.lerpVectors(startPos, endPos, e);
    controls.target.lerpVectors(startTarget, endTarget, e);
    controls.update();
    if (t < 1) cameraTweenId = requestAnimationFrame(step);
  })();
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
const raycaster  = new THREE.Raycaster();
const mouseNDC   = new THREE.Vector2();
const tooltip    = document.getElementById('tooltip');
const infoPanel  = document.getElementById('info-panel');

function onMouseMove(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouseNDC.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  mouseNDC.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;

  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(interactableMeshes);

  if (hoveredMesh && hoveredMesh !== selectedMesh) {
    hoveredMesh.material.emissive.setHex(0x000000);
  }

  if (hits.length > 0) {
    hoveredMesh = hits[0].object.userData.visualMesh || hits[0].object;
    if (hoveredMesh !== selectedMesh) {
      hoveredMesh.material.emissive.setHex(0x3a3a3a);
    }
    // Keep tooltip within viewport
    const tx = Math.min(e.clientX + 14, window.innerWidth - 330);
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = (e.clientY - 8) + 'px';
    tooltip.textContent = hoveredMesh.userData.name;
    tooltip.style.display = 'block';
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hoveredMesh = null;
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
}

function onMouseDown(e) {
  mouseDownPos = { x: e.clientX, y: e.clientY };
}

function onMouseUp(e) {
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (Math.sqrt(dx*dx + dy*dy) < 5) handleClick();
}

function handleClick() {
  if (hoveredMesh) {
    if (selectedMesh && selectedMesh !== hoveredMesh) {
      selectedMesh.material.emissive.setHex(0x000000);
    }
    selectedMesh = hoveredMesh;
    selectedMesh.material.emissive.setHex(0x555555);
    showInfoPanel(selectedMesh.userData);
  } else {
    if (selectedMesh) {
      selectedMesh.material.emissive.setHex(0x000000);
      selectedMesh = null;
    }
    infoPanel.style.display = 'none';
  }
}

function showInfoPanel(data) {
  document.getElementById('ip-dot').style.background = data.color;
  document.getElementById('ip-title').textContent    = data.name;
  document.getElementById('ip-territory').textContent = 'Territory: ' + data.territory;
  document.getElementById('ip-notes').textContent    = data.notes;
  infoPanel.style.display = 'block';
}

function initInteraction() {
  renderer.domElement.addEventListener('mousemove',  onMouseMove);
  renderer.domElement.addEventListener('mousedown',  onMouseDown);
  renderer.domElement.addEventListener('mouseup',    onMouseUp);
  document.getElementById('close-info').addEventListener('click', () => {
    infoPanel.style.display = 'none';
    if (selectedMesh) {
      selectedMesh.material.emissive.setHex(0x000000);
      selectedMesh = null;
    }
  });
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function initUI() {
  const btnLabels = document.getElementById('btn-labels');
  btnLabels.addEventListener('click', () => {
    labelsVisible = !labelsVisible;
    scene.traverse(obj => {
      if (obj instanceof THREE.CSS2DObject) obj.visible = labelsVisible;
    });
    btnLabels.textContent = 'Labels: ' + (labelsVisible ? 'ON' : 'OFF');
    btnLabels.classList.toggle('active', labelsVisible);
  });

  document.getElementById('btn-view-default').addEventListener('click',  () => tweenCamera(CAMERA_PRESETS.cowOverview));
  document.getElementById('btn-view-inferior').addEventListener('click', () => tweenCamera(CAMERA_PRESETS.inferior));
  document.getElementById('btn-view-lateral').addEventListener('click',  () => tweenCamera(CAMERA_PRESETS.lateral));
  document.getElementById('btn-view-anterior').addEventListener('click', () => tweenCamera(CAMERA_PRESETS.anterior));
  document.getElementById('btn-view-full').addEventListener('click',     () => tweenCamera(CAMERA_PRESETS.fullAnatomy));
  document.getElementById('btn-view-reset').addEventListener('click',    () => tweenCamera(CAMERA_PRESETS.default));
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();                     // required for damping
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);   // must follow WebGL render
}

// ─── BOOTSTRAP ───────────────────────────────────────────────────────────────
initScene();
buildBrainContext();
buildVessels();
buildJunctions();
initInteraction();
initUI();
window.addEventListener('resize', onResize);
animate();
</script>
</body>
</html>
